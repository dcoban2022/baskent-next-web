<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f0fa"/>
      <stop offset="100%" style="stop-color:#b8ddf5"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0077b6"/>
      <stop offset="100%" style="stop-color:#005f8e"/>
    </linearGradient>
  </defs>

  <!-- Arka plan -->
  <rect width="800" height="500" fill="url(#bg1)"/>

  <!-- Dekoratif daireler -->
  <circle cx="680" cy="80" r="120" fill="#0077b6" opacity="0.08"/>
  <circle cx="100" cy="420" r="90" fill="#0077b6" opacity="0.06"/>
  <circle cx="750" cy="420" r="60" fill="#e63946" opacity="0.07"/>

  <!-- Sol kısım: kişi -->
  <!-- Vücut -->
  <ellipse cx="220" cy="430" rx="80" ry="25" fill="#0077b6" opacity="0.15"/>
  <!-- Gövde -->
  <rect x="175" y="290" width="90" height="130" rx="20" fill="url(#card1)"/>
  <!-- Baş -->
  <circle cx="220" cy="255" r="45" fill="#fdd5b1"/>
  <!-- Saç -->
  <ellipse cx="220" cy="225" rx="45" ry="22" fill="#4a2c0a"/>
  <rect x="175" y="215" width="90" height="20" rx="10" fill="#4a2c0a"/>
  <!-- Yüz gülümseme -->
  <path d="M205 262 Q220 275 235 262" stroke="#c47a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Gözler -->
  <circle cx="210" cy="252" r="4" fill="#4a2c0a"/>
  <circle cx="230" cy="252" r="4" fill="#4a2c0a"/>
  <!-- Kollar -->
  <rect x="140" y="295" width="35" height="18" rx="9" fill="url(#card1)"/>
  <rect x="265" y="295" width="35" height="18" rx="9" fill="url(#card1)"/>

  <!-- Konuşma baloncukları -->
  <rect x="290" y="130" width="220" height="80" rx="16" fill="white" opacity="0.92"/>
  <polygon points="310,210 290,240 340,210" fill="white" opacity="0.92"/>
  <text x="400" y="168" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#0077b6" text-anchor="middle">Dil ve Konuşma</text>
  <text x="400" y="190" font-family="Arial, sans-serif" font-size="13" fill="#555" text-anchor="middle">Terapisi</text>

  <rect x="310" y="255" width="180" height="65" rx="14" fill="white" opacity="0.85"/>
  <polygon points="330,255 310,225 370,255" fill="white" opacity="0.85"/>
  <text x="400" y="285" font-family="Arial, sans-serif" font-size="13" fill="#0077b6" text-anchor="middle">Artikülasyon</text>
  <text x="400" y="305" font-family="Arial, sans-serif" font-size="13" fill="#555" text-anchor="middle">Kekemelik · Afazi</text>

  <!-- Ses dalgaları -->
  <path d="M530 200 Q545 185 545 200 Q545 215 530 215" stroke="#e63946" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M545 190 Q565 175 565 200 Q565 225 545 210" stroke="#e63946" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M565 180 Q590 160 590 200 Q590 240 565 220" stroke="#e63946" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- Sağ: bilgi kartı -->
  <rect x="580" y="280" width="175" height="120" rx="16" fill="white" opacity="0.9" filter="drop-shadow(0 4px 12px rgba(0,0,0,0.1))"/>
  <text x="667" y="315" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0077b6" text-anchor="middle">Uzman Terapi</text>
  <line x1="600" y1="330" x2="735" y2="330" stroke="#e5e7eb" stroke-width="1"/>
  <text x="667" y="355" font-family="Arial, sans-serif" font-size="12" fill="#555" text-anchor="middle">✓ Bireysel Seans</text>
  <text x="667" y="375" font-family="Arial, sans-serif" font-size="12" fill="#555" text-anchor="middle">✓ Aile Rehberliği</text>

  <!-- Alt başlık -->
  <rect x="30" y="30" width="260" height="50" rx="12" fill="#0077b6" opacity="0.9"/>
  <text x="160" y="62" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Dil ve Konuşma Bozuklukları</text>
</svg>
