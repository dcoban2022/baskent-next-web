<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff7ed"/>
      <stop offset="100%" style="stop-color:#fed7aa"/>
    </linearGradient>
    <linearGradient id="desk" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#92400e"/>
      <stop offset="100%" style="stop-color:#78350f"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg6)"/>

  <circle cx="700" cy="90" r="130" fill="#f97316" opacity="0.07"/>
  <circle cx="90" cy="430" r="100" fill="#e63946" opacity="0.06"/>

  <!-- Masa -->
  <rect x="100" y="340" width="400" height="18" rx="6" fill="url(#desk)"/>
  <rect x="130" y="358" width="18" height="80" rx="4" fill="#92400e"/>
  <rect x="452" y="358" width="18" height="80" rx="4" fill="#92400e"/>

  <!-- Kişi (öğretmen) -->
  <!-- Gövde -->
  <rect x="570" y="270" width="80" height="120" rx="18" fill="#0077b6"/>
  <!-- Baş -->
  <circle cx="610" cy="240" r="40" fill="#fdd5b1"/>
  <!-- Saç -->
  <ellipse cx="610" cy="213" rx="40" ry="18" fill="#7c3aed"/>
  <!-- Yüz -->
  <circle cx="600" cy="237" r="4" fill="#7c3aed"/>
  <circle cx="620" cy="237" r="4" fill="#7c3aed"/>
  <path d="M597 250 Q610 260 623 250" stroke="#c47a3a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Kol (tahtayı gösteriyor) -->
  <path d="M570 295 L520 280" stroke="#fdd5b1" stroke-width="14" stroke-linecap="round"/>
  <!-- El -->
  <circle cx="518" cy="279" r="9" fill="#fdd5b1"/>

  <!-- Tahta/whiteboard -->
  <rect x="120" y="130" width="370" height="200" rx="10" fill="white" filter="drop-shadow(0 5px 16px rgba(0,0,0,0.12))"/>
  <!-- Tahta çerçevesi -->
  <rect x="120" y="130" width="370" height="200" rx="10" fill="none" stroke="#d1d5db" stroke-width="3"/>

  <!-- Tahta içeriği: Disgrafi, Diskalkuli, Dispraksi -->
  <!-- Disgrafi (el yazısı) -->
  <text x="155" y="175" font-family="cursive" font-size="20" fill="#7c3aed" opacity="0.8">Disgrafi</text>
  <!-- El yazısı çizgileri -->
  <path d="M155 188 Q185 182 215 188 Q245 194 275 188" stroke="#7c3aed" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Diskalkuli (matematik) -->
  <text x="155" y="230" font-family="Arial, sans-serif" font-size="16" fill="#e63946" font-weight="bold">2 + 3 = ?</text>
  <text x="240" y="230" font-family="Arial, sans-serif" font-size="16" fill="#10b981" font-weight="bold">= 5</text>
  <!-- Sayı blokları -->
  <rect x="155" y="240" width="18" height="18" rx="3" fill="#e63946" opacity="0.7"/>
  <rect x="178" y="240" width="18" height="18" rx="3" fill="#e63946" opacity="0.7"/>
  <text x="202" y="254" font-family="Arial, sans-serif" font-size="14" fill="#333">+</text>
  <rect x="215" y="240" width="18" height="18" rx="3" fill="#e63946" opacity="0.7"/>
  <rect x="238" y="240" width="18" height="18" rx="3" fill="#e63946" opacity="0.7"/>
  <rect x="261" y="240" width="18" height="18" rx="3" fill="#e63946" opacity="0.7"/>
  <text x="285" y="254" font-family="Arial, sans-serif" font-size="14" fill="#333">=</text>
  <rect x="298" y="234" width="30" height="30" rx="5" fill="#10b981" opacity="0.8"/>
  <text x="313" y="254" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">5</text>

  <!-- Dispraksi (hareket/koordinasyon) -->
  <text x="155" y="295" font-family="Arial, sans-serif" font-size="13" fill="#0077b6" font-weight="bold">Dispraksi: Motor Koordinasyon</text>
  <!-- Koordinasyon çizgileri/oklar -->
  <path d="M165 308 L200 308" stroke="#0077b6" stroke-width="2" marker-end="url(#arrow)" opacity="0.7"/>
  <path d="M210 308 L210 325" stroke="#f97316" stroke-width="2" opacity="0.7"/>
  <path d="M220 315 L255 308" stroke="#10b981" stroke-width="2" opacity="0.7"/>

  <!-- Sağ taraf: 3 hizmet kartı -->
  <rect x="520" y="130" width="240" height="70" rx="12" fill="white" opacity="0.88"/>
  <text x="640" y="158" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#7c3aed" text-anchor="middle">Disgrafi</text>
  <text x="640" y="176" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">El yazısı &amp; ince motor gelişimi</text>
  <text x="640" y="192" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Yazma stratejileri eğitimi</text>

  <rect x="520" y="215" width="240" height="70" rx="12" fill="white" opacity="0.88"/>
  <text x="640" y="243" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e63946" text-anchor="middle">Diskalkuli</text>
  <text x="640" y="261" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Sayı &amp; sembol algı desteği</text>
  <text x="640" y="277" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Somut matematik eğitimi</text>

  <rect x="520" y="300" width="240" height="70" rx="12" fill="white" opacity="0.88"/>
  <text x="640" y="328" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#0077b6" text-anchor="middle">Dispraksi</text>
  <text x="640" y="346" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Motor koordinasyon gelişimi</text>
  <text x="640" y="362" font-family="Arial, sans-serif" font-size="11" fill="#666" text-anchor="middle">Amaca yönelik hareket eğitimi</text>

  <!-- Başlık -->
  <rect x="30" y="30" width="250" height="50" rx="12" fill="#f97316" opacity="0.9"/>
  <text x="155" y="62" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Öğrenme Güçlükleri Eğitimi</text>
</svg>
