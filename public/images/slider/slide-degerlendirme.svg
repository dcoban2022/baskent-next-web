<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4"/>
      <stop offset="100%" style="stop-color:#dcfce7"/>
    </linearGradient>
    <linearGradient id="clipboard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0077b6"/>
      <stop offset="100%" style="stop-color:#005f8e"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg5)"/>

  <circle cx="720" cy="80" r="130" fill="#10b981" opacity="0.07"/>
  <circle cx="80" cy="420" r="100" fill="#0077b6" opacity="0.06"/>
  <circle cx="740" cy="430" r="70" fill="#10b981" opacity="0.06"/>

  <!-- Büyük pano (clipboard) -->
  <!-- Gövde -->
  <rect x="130" y="120" width="260" height="320" rx="14" fill="white" filter="drop-shadow(0 8px 24px rgba(0,0,0,0.12))"/>
  <!-- Üst kıskaç -->
  <rect x="200" y="110" width="120" height="30" rx="8" fill="url(#clipboard)"/>
  <rect x="240" y="105" width="40" height="18" rx="5" fill="#e5e7eb"/>

  <!-- Pano başlık -->
  <rect x="150" y="155" width="220" height="28" rx="6" fill="#f0f9ff"/>
  <text x="260" y="174" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#0077b6" text-anchor="middle">Bireysel Değerlendirme</text>

  <!-- Kontrol listesi -->
  <!-- TEDİL -->
  <rect x="150" y="198" width="20" height="20" rx="4" fill="#10b981"/>
  <text x="160" y="213" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">✓</text>
  <text x="180" y="213" font-family="Arial, sans-serif" font-size="13" fill="#333">TEDİL Testi</text>

  <!-- AAT -->
  <rect x="150" y="228" width="20" height="20" rx="4" fill="#10b981"/>
  <text x="160" y="243" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">✓</text>
  <text x="180" y="243" font-family="Arial, sans-serif" font-size="13" fill="#333">AAT Bataryası</text>

  <!-- Disleksi -->
  <rect x="150" y="258" width="20" height="20" rx="4" fill="#10b981"/>
  <text x="160" y="273" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">✓</text>
  <text x="180" y="273" font-family="Arial, sans-serif" font-size="13" fill="#333">Disleksi Bataryası</text>

  <!-- Informal -->
  <rect x="150" y="288" width="20" height="20" rx="4" fill="#10b981"/>
  <text x="160" y="303" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">✓</text>
  <text x="180" y="303" font-family="Arial, sans-serif" font-size="13" fill="#333">Informal Gözlem</text>

  <!-- BEP -->
  <rect x="150" y="318" width="20" height="20" rx="4" fill="#10b981"/>
  <text x="160" y="333" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">✓</text>
  <text x="180" y="333" font-family="Arial, sans-serif" font-size="13" fill="#333">BEP Hazırlama</text>

  <!-- Aile görüşme -->
  <rect x="150" y="348" width="20" height="20" rx="4" fill="#10b981"/>
  <text x="160" y="363" font-family="Arial, sans-serif" font-size="13" fill="white" text-anchor="middle">✓</text>
  <text x="180" y="363" font-family="Arial, sans-serif" font-size="13" fill="#333">Aile Görüşmesi</text>

  <!-- Çizgi -->
  <line x1="150" y1="385" x2="370" y2="385" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="260" y="404" font-family="Arial, sans-serif" font-size="11" fill="#999" text-anchor="middle">Formal &amp; Informal Değerlendirme</text>

  <!-- Sağ taraf: süreç adımları -->
  <!-- Adım 1 -->
  <circle cx="520" cy="155" r="28" fill="#0077b6"/>
  <text x="520" y="162" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">1</text>
  <text x="580" y="150" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Başvuru</text>
  <text x="580" y="168" font-family="Arial, sans-serif" font-size="11" fill="#777">İletişim &amp; randevu</text>
  <line x1="520" y1="183" x2="520" y2="213" stroke="#10b981" stroke-width="2.5" stroke-dasharray="4,3"/>

  <!-- Adım 2 -->
  <circle cx="520" cy="228" r="28" fill="#0077b6"/>
  <text x="520" y="235" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">2</text>
  <text x="580" y="223" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Değerlendirme</text>
  <text x="580" y="241" font-family="Arial, sans-serif" font-size="11" fill="#777">Test &amp; gözlem</text>
  <line x1="520" y1="256" x2="520" y2="286" stroke="#10b981" stroke-width="2.5" stroke-dasharray="4,3"/>

  <!-- Adım 3 -->
  <circle cx="520" cy="301" r="28" fill="#0077b6"/>
  <text x="520" y="308" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">3</text>
  <text x="580" y="296" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Program</text>
  <text x="580" y="314" font-family="Arial, sans-serif" font-size="11" fill="#777">BEP hazırlama</text>
  <line x1="520" y1="329" x2="520" y2="359" stroke="#10b981" stroke-width="2.5" stroke-dasharray="4,3"/>

  <!-- Adım 4 -->
  <circle cx="520" cy="374" r="28" fill="#10b981"/>
  <text x="520" y="381" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">4</text>
  <text x="580" y="369" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#333">Eğitim</text>
  <text x="580" y="387" font-family="Arial, sans-serif" font-size="11" fill="#777">Bireysel seans</text>

  <!-- Kalem / imza -->
  <g transform="translate(640, 160) rotate(-30)">
    <rect x="0" y="0" width="14" height="55" rx="3" fill="#e63946"/>
    <polygon points="0,55 14,55 7,70" fill="#333"/>
    <rect x="2" y="45" width="10" height="6" fill="white" opacity="0.5"/>
  </g>

  <!-- Başlık -->
  <rect x="30" y="30" width="200" height="50" rx="12" fill="#0077b6" opacity="0.9"/>
  <text x="130" y="62" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Değerlendirme</text>
</svg>
