<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f7fa"/>
      <stop offset="100%" style="stop-color:#b2ebf2"/>
    </linearGradient>
    <linearGradient id="ear" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0096c7"/>
      <stop offset="100%" style="stop-color:#0077b6"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" fill="url(#bg4)"/>

  <circle cx="700" cy="90" r="130" fill="#0096c7" opacity="0.08"/>
  <circle cx="100" cy="420" r="95" fill="#0077b6" opacity="0.06"/>

  <!-- Kulak illüstrasyonu (merkez-sol) -->
  <!-- Dış kulak yolu -->
  <path d="M200 160 C155 160 120 195 120 250 C120 305 155 340 200 340 C225 340 240 330 250 315 C260 300 262 282 255 270 C248 258 235 255 225 262 C215 268 215 280 222 285 C228 290 235 285 232 278" stroke="url(#ear)" stroke-width="22" fill="none" stroke-linecap="round"/>
  <!-- İç kulak kanal -->
  <path d="M252 268 C265 258 275 250 280 250" stroke="#0096c7" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Kulak memesi -->
  <ellipse cx="210" cy="328" rx="18" ry="14" fill="#fdd5b1"/>

  <!-- Ses dalgaları (kulaktan dışarı) -->
  <path d="M310 200 Q335 210 340 250 Q335 290 310 300" stroke="#0077b6" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M330 185 Q365 200 370 250 Q365 300 330 315" stroke="#0077b6" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M350 170 Q393 190 398 250 Q393 310 350 330" stroke="#0077b6" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M370 155 Q420 178 426 250 Q420 322 370 345" stroke="#0077b6" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.25"/>

  <!-- Ses kaynağı (sağda) -->
  <!-- Hoparlör/nota ikonu -->
  <rect x="460" y="210" width="50" height="80" rx="8" fill="#0077b6" opacity="0.85"/>
  <polygon points="510,215 550,190 550,310 510,285" fill="#0077b6" opacity="0.7"/>
  <text x="485" y="260" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle">♪</text>

  <!-- Müzik notaları -->
  <text x="570" y="185" font-family="Arial, sans-serif" font-size="28" fill="#0096c7" opacity="0.6">♩</text>
  <text x="610" y="215" font-family="Arial, sans-serif" font-size="22" fill="#0077b6" opacity="0.5">♫</text>
  <text x="590" y="155" font-family="Arial, sans-serif" font-size="20" fill="#0096c7" opacity="0.4">♪</text>

  <!-- Sağ taraf: bilgi kartları -->
  <rect x="480" y="320" width="280" height="140" rx="16" fill="white" opacity="0.9" filter="drop-shadow(0 4px 14px rgba(0,0,0,0.1))"/>
  <text x="620" y="355" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#0077b6" text-anchor="middle">İşitme Engeli Eğitimi</text>
  <line x1="500" y1="368" x2="740" y2="368" stroke="#e5e7eb" stroke-width="1"/>
  <text x="510" y="390" font-family="Arial, sans-serif" font-size="12" fill="#555">✓  İşitsel Algı Eğitimi</text>
  <text x="510" y="410" font-family="Arial, sans-serif" font-size="12" fill="#555">✓  Konuşma–Dil Terapisi</text>
  <text x="510" y="430" font-family="Arial, sans-serif" font-size="12" fill="#555">✓  Aile Rehberliği</text>
  <text x="510" y="450" font-family="Arial, sans-serif" font-size="12" fill="#555">✓  1 Yaşından İtibaren</text>

  <!-- İşaret dili elleri (sol alt) -->
  <circle cx="120" cy="390" r="45" fill="white" opacity="0.6"/>
  <text x="120" y="402" font-family="Arial, sans-serif" font-size="32" text-anchor="middle" opacity="0.7">🤟</text>

  <!-- Başlık -->
  <rect x="30" y="30" width="230" height="50" rx="12" fill="#0077b6" opacity="0.9"/>
  <text x="145" y="62" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">İşitme Engeli Eğitimi</text>

  <!-- Dalga çizgisi (dekoratif alt) -->
  <path d="M30 460 Q100 440 170 460 Q240 480 310 460 Q380 440 450 460 Q520 480 590 460 Q660 440 730 460 Q770 470 800 460" stroke="#0077b6" stroke-width="2" fill="none" opacity="0.2"/>
</svg>
